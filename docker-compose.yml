services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conv-studio-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: conv-studio-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
