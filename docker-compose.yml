services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conv-studio-app
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "3000"
    networks:
      conv-studio-net:
        aliases:
          - app

  nginx:
    image: nginx:1.27-alpine
    container_name: conv-studio-nginx
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/http.conf.template:/etc/nginx/templates/http.conf.template:ro
      - ./nginx/https.conf.template:/etc/nginx/templates/https.conf.template:ro
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    command: ["/bin/sh", "/entrypoint.sh"]
    networks:
      - conv-studio-net

  certbot:
    image: certbot/certbot:latest
    container_name: conv-studio-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - conv-studio-net

volumes:
  certbot_www:
  letsencrypt:

networks:
  conv-studio-net:
    driver: bridge
